  const [activeTicker,  setActiveTicker]  = useState('AAPL');
  const [timeframe,     setTimeframe]     = useState('1M');
  const [watchlist,     setWatchlist]     = useState(DEFAULT_WATCHLIST);
  const [showSettings,  setShowSettings]  = useState(false);
  const [addingTicker,  setAddingTicker]  = useState(false);
  const [newTicker,     setNewTicker]     = useState('');
  const [searchQuery,   setSearchQuery]   = useState('');
  const [aiQuery,       setAiQuery]       = useState('');
  const [aiResponse,    setAiResponse]    = useState('');
  const [aiLoading,     setAiLoading]     = useState(false);
  const [liveNews,      setLiveNews]      = useState([]);
  const [scoredNews,    setScoredNews]    = useState([]);
  const [newsLoading,   setNewsLoading]   = useState(false);
  const [sentimentLoading, setSentimentLoading] = useState(false);
  const [newsError,     setNewsError]     = useState('');
  const [liveChartData, setLiveChartData] = useState(null);
  const [chartLoading,  setChartLoading]  = useState(false);
  const [quoteLoading,  setQuoteLoading]  = useState(false);
  const [quoteError,    setQuoteError]    = useState('');
  const [dataSource,    setDataSource]    = useState('demo');
  const [lastUpdated,   setLastUpdated]   = useState(null);
  const [alerts,        setAlerts]        = useState(() => {
    try { return JSON.parse(localStorage.getItem('ml_alerts') || '[]'); } catch { return []; }
  });
  const [toasts,        setToasts]        = useState([]);

  const [apiKeys, setApiKeys] = useState(() => {
    try { return JSON.parse(localStorage.getItem('ml_keys') || '{}'); } catch { return {}; }
  });

  const hasAnthropicKey = !!(apiKeys.anthropic && apiKeys.anthropic.length > 10);
  const hasFinnhubKey   = !!(apiKeys.finnhub   && apiKeys.finnhub.length   > 4);
  const currentStock    = watchlist.find(s => s.sym === activeTicker) || watchlist[0];

  const saveKeys = useCallback((keys) => {
    setApiKeys(keys);
    try { localStorage.setItem('ml_keys', JSON.stringify(keys)); } catch {}
  }, []);

  /* ── Alert dismissal ── */
  const dismissToast = useCallback((id) => {
    setToasts(t => t.filter(x => x.id !== id));
  }, []);

  /* ── Price alert polling — checks every 60s ── */
  useEffect(() => {
    if (!hasFinnhubKey) return;
    const check = async () => {
      const stored = JSON.parse(localStorage.getItem('ml_alerts') || '[]');
      const untriggered = stored.filter(a => !a.triggered);
      if (!untriggered.length) return;
      for (const alert of untriggered) {
        try {
          const q = await fetchQuote(alert.sym, apiKeys.finnhub);
          const hit = alert.direction === 'above'
            ? q.price >= alert.target
            : q.price <= alert.target;
          if (hit) {
            // Mark as triggered in storage
            const updated = stored.map(a => a.id === alert.id ? { ...a, triggered: true } : a);
            localStorage.setItem('ml_alerts', JSON.stringify(updated));
            setAlerts(updated);
            // Show toast
            const toast = { id: Date.now(), sym: alert.sym, target: alert.target, direction: alert.direction, currentPrice: q.price };
            setToasts(t => [...t, toast]);
            // Auto-dismiss toast after 8s
            setTimeout(() => setToasts(t => t.filter(x => x.id !== toast.id)), 8000);
          }
        } catch {}
      }
    };
    // Check immediately then every 60s
    check();
    const interval = setInterval(check, 60000);
    return () => clearInterval(interval);
  }, [apiKeys.finnhub, hasFinnhubKey]);

  /* ── Quote + Chart ── */
  useEffect(() => {
    if (!hasFinnhubKey) { setDataSource('demo'); return; }
    let cancelled = false;
    const load = async () => {
      setQuoteLoading(true); setChartLoading(true); setQuoteError('');
      let livePrice = null; // will be set after quote fetch, used to pin chart to current price
      try {
        const q = await fetchQuote(activeTicker, apiKeys.finnhub);
        if (!cancelled) {
          livePrice = q.price;
          setWatchlist(wl => wl.map(s => s.sym === activeTicker ? { ...s, ...q } : s));
          setDataSource('live'); setLastUpdated(new Date());
        }
      } catch (err) { if (!cancelled) { setQuoteError(err.message); setDataSource('demo'); } }
      finally       { if (!cancelled) setQuoteLoading(false); }
      try {
        const chart = await fetchChart(activeTicker, apiKeys.finnhub);
        if (!cancelled) {
          // Append today's live price so the chart reflects the current quote
          const todayLabel = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
          const lastLabel  = chart.labels[chart.labels.length - 1];
          // Only append if today isn't already the last candle
          if (lastLabel !== todayLabel && livePrice != null) {
            chart.prices.push(livePrice);
            chart.labels.push(todayLabel);
            chart.timestamps.push(Math.floor(Date.now() / 1000));
          } else if (livePrice != null) {
            // Update the last candle to the live price
            chart.prices[chart.prices.length - 1] = livePrice;
          }
          setLiveChartData(chart);
        }
      } catch { if (!cancelled) setLiveChartData(null); }
      finally  { if (!cancelled) setChartLoading(false); }
    };
    load();
    return () => { cancelled = true; };
  }, [activeTicker, apiKeys.finnhub, hasFinnhubKey]);

  /* ── News + Auto-sentiment scoring ── */
  useEffect(() => {
    if (!hasFinnhubKey) { setLiveNews([]); setScoredNews([]); return; }
    let cancelled = false;
    const load = async () => {
      setNewsLoading(true); setNewsError(''); setScoredNews([]);
      try {
        const articles = await fetchNews(activeTicker, apiKeys.finnhub);
        if (cancelled) return;
        setLiveNews(articles);
        // Mark all as "scoring" initially
        setScoredNews(articles.map(a => ({ ...a, sentiment: null })));

        // Auto-score if Anthropic key is present
        if (hasAnthropicKey && articles.length > 0) {
          setSentimentLoading(true);
          try {
            const scored = await scoreNewsSentiment(articles, activeTicker, apiKeys.anthropic);
            if (!cancelled) setScoredNews(scored);
          } catch { if (!cancelled) setScoredNews(articles); }
          finally  { if (!cancelled) setSentimentLoading(false); }
        } else {
          setScoredNews(articles);
        }
      } catch (err) { if (!cancelled) { setNewsError(err.message); setLiveNews([]); setScoredNews([]); } }
      finally       { if (!cancelled) setNewsLoading(false); }
    };
    load();
    return () => { cancelled = true; };
  }, [activeTicker, apiKeys.finnhub, apiKeys.anthropic, hasFinnhubKey, hasAnthropicKey]);

  /* ── Background watchlist quotes ── */
  useEffect(() => {
    if (!hasFinnhubKey) return;
    const others = watchlist.filter(s => s.sym !== activeTicker && s.price === null);
    const timers = others.map((s, i) =>
      setTimeout(async () => {
        try {
          const q = await fetchQuote(s.sym, apiKeys.finnhub);
          setWatchlist(wl => wl.map(w => w.sym === s.sym ? { ...w, ...q } : w));
        } catch {}
      }, (i + 1) * 3000)
    );
    return () => timers.forEach(clearTimeout);
  }, [apiKeys.finnhub, hasFinnhubKey]);

  /* ── AI Analysis ── */
  const runAIAnalysis = useCallback(async (query) => {
    if (!hasAnthropicKey) { setShowSettings(true); return; }
    const question = query || `Analyze ${activeTicker}. Give a concise investment thesis with key catalysts, risks, and a BULLISH, BEARISH, or NEUTRAL verdict.`;
    setAiLoading(true); setAiResponse('');

    const newsCtx = scoredNews.length > 0
      ? scoredNews.slice(0, 6).map(n => `- [${(n.sentiment || 'unscored').toUpperCase()}${n.sentimentScore ? ' ' + n.sentimentScore : ''}] ${n.headline} (${n.source}, ${n.time})`).join('\n')
      : 'No live news available.';

    const prompt = `You are a professional equity analyst.

Ticker: ${activeTicker} (${currentStock.name})
Price: ${fmt$(currentStock.price)} | Change: ${fmtPct(currentStock.chg)}
${currentStock.high ? `High: ${fmt$(currentStock.high)} | Low: ${fmt$(currentStock.low)} | Prev close: ${fmt$(currentStock.prevClose)}` : ''}
Data: ${dataSource === 'live' ? 'Live Finnhub data' : 'Demo data'}

Scored news (sentiment + confidence):
${newsCtx}

Question: ${question}

Respond in 2-3 focused paragraphs. Lead with BULLISH, BEARISH, or NEUTRAL. Reference specific scored headlines to support your thesis. Be direct and actionable.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKeys.anthropic,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 700,
          messages: [{ role: 'user', content: prompt }] })
      });
      if (!res.ok) throw new Error(`API error ${res.status}`);
      const data = await res.json();
      const text = data.content?.[0]?.text || 'No response received.';
      let i = 0;
      const tick = setInterval(() => {
        setAiResponse(text.slice(0, i)); i += 8;
        if (i > text.length) { setAiResponse(text); clearInterval(tick); setAiLoading(false); }
      }, 16);
    } catch (err) { setAiResponse(`Error: ${err.message}`); setAiLoading(false); }
  }, [activeTicker, apiKeys, hasAnthropicKey, currentStock, scoredNews, dataSource]);

  /* ── Add ticker ── */
  const addToWatchlist = () => {
    if (!newTicker.trim()) { setAddingTicker(false); return; }
    const sym = newTicker.trim().toUpperCase();
    if (!watchlist.find(w => w.sym === sym)) {
      setWatchlist(wl => [...wl, { sym, name: sym, price: null, chg: null }]);
      if (hasFinnhubKey) setTimeout(async () => {
        try {
          const q = await fetchQuote(sym, apiKeys.finnhub);
          setWatchlist(wl => wl.map(s => s.sym === sym ? { ...s, ...q } : s));
        } catch {}
      }, 500);
    }
    setNewTicker(''); setAddingTicker(false);
  };

  const filteredWatchlist = searchQuery
    ? watchlist.filter(s => s.sym.includes(searchQuery.toUpperCase()) || s.name.toLowerCase().includes(searchQuery.toLowerCase()))
    : watchlist;

  // Correlation pins for chart
  const chartPins = scoredNews.filter(n => n.sentiment && n.sentiment !== 'neutral').slice(0, 6);
  const bullCount = scoredNews.filter(n => n.sentiment === 'bullish').length;
  const bearCount = scoredNews.filter(n => n.sentiment === 'bearish').length;

  /* ── Render ── */
  return (
    <div className="app">
      {/* Sidebar */}
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-mark">
            <div className="logo-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
            <span className="logo-name">MarketLens</span>
          </div>
          <div className="logo-tagline">AI Investment Intelligence</div>
        </div>

        <div className="sidebar-section">
          <div className="sidebar-label">Navigation</div>
          {[
            { id: 'market',    label: 'Market Overview', Ico: Icon.Chart },
            { id: 'portfolio', label: 'My Portfolio',    Ico: Icon.Portfolio },
            { id: 'alerts',    label: `Alerts${alerts.filter(a=>!a.triggered).length > 0 ? ' ('+alerts.filter(a=>!a.triggered).length+')' : ''}`, Ico: Icon.Bell },
            { id: 'compare',   label: 'Compare',         Ico: Icon.Chart },
            { id: 'ai',        label: 'AI Analysis',     Ico: Icon.AI },
          ].map(({ id, label, Ico }) => (
            <button key={id} className={`nav-item ${activeTab === id ? 'active' : ''}`} onClick={() => setActiveTab(id)}>
              <Ico />{label}
            </button>
          ))}
          <button className="nav-item" onClick={() => setShowSettings(true)}>
            <Icon.Settings />API Settings
          </button>
        </div>

        <div className="sidebar-section" style={{flex:1}}>
          <div className="sidebar-label" style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0 8px',marginBottom:'6px'}}>
            <span>Watchlist</span>
            {dataSource === 'live' && <span style={{color:'var(--accent)',fontSize:'9px',fontWeight:600}}>● LIVE</span>}
          </div>
          <div className="watchlist-items">
            {filteredWatchlist.map(s => (
              <div key={s.sym} className={`watchlist-ticker ${activeTicker === s.sym ? 'active' : ''}`}
                onClick={() => { setActiveTicker(s.sym); setAiResponse(''); setLiveChartData(null); setScoredNews([]); setActiveTab('market'); }}>
                <div className="ticker-left">
                  <span className="ticker-sym">{s.sym}</span>
                  <span className="ticker-name">{s.name.split(' ').slice(0,2).join(' ')}</span>
                </div>
                <div className="ticker-right">
                  {s.price != null ? (
                    <>
                      <span className={`ticker-price ${(s.chg||0)>=0?'pos':'neg'}`}>{fmt$(s.price)}</span>
                      <span className={`ticker-chg  ${(s.chg||0)>=0?'pos':'neg'}`}>{fmtPct(s.chg)}</span>
                    </>
                  ) : <span style={{color:'var(--text3)',fontSize:'11px'}}>{hasFinnhubKey?'loading…':'—'}</span>}
                </div>
              </div>
            ))}
          </div>
          {addingTicker ? (
            <input autoFocus className="add-ticker-input" placeholder="TICKER…" maxLength={6}
              value={newTicker} onChange={e => setNewTicker(e.target.value.toUpperCase())}
              onKeyDown={e => { if (e.key==='Enter') addToWatchlist(); if (e.key==='Escape') setAddingTicker(false); }}
              onBlur={addToWatchlist} />
          ) : (
            <button className="add-ticker-btn" onClick={() => setAddingTicker(true)}><Icon.Plus />Add ticker</button>
          )}
        </div>
      </aside>

      {/* Main */}
      <main className="main">
        {/* Topbar */}
        <div className="topbar">
          <div className="search-wrap">
            <Icon.Search />
            <input className="search-input" placeholder="Search tickers, companies…"
              value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
          </div>
          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            <div className="api-status">
              <div className="status-dot" style={{background:hasAnthropicKey?'var(--accent)':'var(--amber)'}}></div>
              {hasAnthropicKey?'AI':'No AI'}
            </div>
            <div className="api-status">
              <div className="status-dot" style={{background:hasFinnhubKey?'var(--accent2)':'var(--text3)'}}></div>
              {hasFinnhubKey?(quoteLoading?'Fetching…':'Prices'):'No Prices'}
            </div>
            <div className="api-status">
              <div className="status-dot" style={{background:hasFinnhubKey?'var(--purple)':'var(--text3)'}}></div>
              {hasFinnhubKey?(newsLoading?'Loading…':sentimentLoading?'Scoring…':'News'):'No News'}
            </div>
          </div>
          <button className="btn-primary" style={{fontSize:'12px',padding:'7px 14px'}}
            onClick={() => { setActiveTab('ai'); runAIAnalysis(); }} disabled={aiLoading}>
            {aiLoading?'Analyzing…':'⚡ Analyze'}
          </button>
        </div>

        <div className="content">
          {quoteError && (
            <div style={{background:'rgba(248,113,113,0.1)',border:'1px solid rgba(248,113,113,0.2)',borderRadius:'var(--radius)',padding:'10px 14px',marginBottom:'16px',fontSize:'12px',color:'var(--red)',display:'flex',justifyContent:'space-between'}}>
              <span>⚠ Prices: {quoteError}</span><span style={{color:'var(--text3)'}}>Showing demo chart</span>
            </div>
          )}
          {newsError && (
            <div style={{background:'rgba(248,113,113,0.1)',border:'1px solid rgba(248,113,113,0.2)',borderRadius:'var(--radius)',padding:'10px 14px',marginBottom:'16px',fontSize:'12px',color:'var(--red)'}}>
              ⚠ News: {newsError}
            </div>
          )}

          {/* Main tab navigation */}
          <div className="main-tabs">
            {[
              { id:'market',    label:'Market Overview' },
              { id:'portfolio', label:'Portfolio' },
              { id:'alerts',    label:`Alerts${alerts.filter(a=>!a.triggered).length > 0 ? ' ('+alerts.filter(a=>!a.triggered).length+')' : ''}` },
              { id:'compare',   label:'Compare' },
              { id:'ai',        label:'AI Analysis' },
            ].map(({ id, label }) => (
              <button key={id} className={`main-tab ${activeTab===id?'active':''}`} onClick={() => setActiveTab(id)}>
                {label}
              </button>
            ))}
          </div>

          {/* ── MARKET TAB ── */}
          {activeTab === 'market' && (
            <>
              {/* Metric cards */}
              <div className="hero-grid">
                <div className="metric-card">
                  <div className="metric-label" style={{display:'flex',justifyContent:'space-between'}}>
                    <span>Current Price</span>
                    {quoteLoading && <span style={{color:'var(--accent2)',fontSize:'10px'}}>updating…</span>}
                    {lastUpdated && !quoteLoading && <span style={{color:'var(--text3)',fontSize:'10px'}}>{timeAgo(lastUpdated)}</span>}
                  </div>
                  {currentStock.price != null ? (
                    <>
                      <div className="metric-value" style={{color:(currentStock.chg||0)>=0?'var(--accent)':'var(--red)'}}>
                        {fmt$(currentStock.price)}
                      </div>
                      <div className={`metric-sub ${(currentStock.chg||0)>=0?'pos':'neg'}`}>
                        {(currentStock.chg||0)>=0?'▲':'▼'} {Math.abs(currentStock.chg||0).toFixed(2)}% today
                      </div>
                    </>
                  ) : (
                    <div className="metric-value" style={{color:'var(--text3)',fontSize:'16px'}}>
                      {hasFinnhubKey?'Loading…':'Add Finnhub key'}
                    </div>
                  )}
                </div>

                <div className="metric-card">
                  <div className="metric-label">Today's Range</div>
                  {currentStock.high && currentStock.low ? (
                    <>
                      <div className="metric-value" style={{fontSize:'16px',color:'var(--text)'}}>
                        {fmt$(currentStock.low)} – {fmt$(currentStock.high)}
                      </div>
                      <div className="metric-sub" style={{color:'var(--text3)'}}>
                        Prev close {fmt$(currentStock.prevClose)}
                      </div>
                    </>
                  ) : (
                    <div className="metric-value" style={{color:'var(--text3)',fontSize:'16px'}}>
                      {(currentStock.chg||0)>=0?'▲ Bullish':'▼ Bearish'}
                    </div>
                  )}
                </div>

                <div className="metric-card">
                  <div className="metric-label">News Sentiment</div>
                  {scoredNews.filter(n=>n.sentiment).length > 0 ? (
                    <>
                      <div className="metric-value" style={{fontSize:'18px',color: bullCount > bearCount ? 'var(--accent)' : bearCount > bullCount ? 'var(--red)' : 'var(--amber)'}}>
                        {bullCount > bearCount ? '▲ Bullish' : bearCount > bullCount ? '▼ Bearish' : '● Neutral'}
                      </div>
                      <div className="metric-sub" style={{color:'var(--text3)'}}>
                        {bullCount}↑ {bearCount}↓ from {scoredNews.length} articles
                      </div>
                    </>
                  ) : (
                    <div className="metric-value" style={{color:'var(--text3)',fontSize:'16px'}}>
                      {sentimentLoading ? 'Scoring…' : liveNews.length > 0 ? 'Pending' : '—'}
                    </div>
                  )}
                </div>
              </div>

              {/* Chart + News */}
              <div className="dashboard-grid">
                <div className="card">
                  <div className="chart-header">
                    <div>
                      <div className="chart-ticker">{activeTicker}</div>
                      <div style={{color:'var(--text2)',fontSize:'13px'}}>{currentStock.name}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      {currentStock.price != null ? (
                        <>
                          <div className={`chart-price ${(currentStock.chg||0)>=0?'pos':'neg'}`}>{fmt$(currentStock.price)}</div>
                          <div className={`chart-chg  ${(currentStock.chg||0)>=0?'pos':'neg'}`}>{fmtPct(currentStock.chg)}</div>
                        </>
                      ) : <div style={{color:'var(--text3)',fontSize:'13px'}}>{hasFinnhubKey?'Loading…':'Demo mode'}</div>}
                    </div>
                  </div>

                  <div className="timeframes" style={{marginBottom:'16px'}}>
                    {['1W','1M','3M','6M','1Y'].map(tf=>(
                      <button key={tf} className={`tf-btn ${timeframe===tf?'active':''}`} onClick={()=>setTimeframe(tf)}>{tf}</button>
                    ))}
                    {liveChartData && <span style={{fontSize:'11px',color:'var(--accent)',marginLeft:'8px'}}>● live</span>}
                  </div>

                  <div className="chart-container">
                    {chartLoading ? (
                      <div style={{height:'240px',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text3)',fontSize:'13px'}}>Loading chart…</div>
                    ) : (
                      <PriceChart ticker={activeTicker} timeframe={timeframe}
                        liveChartData={liveChartData} currentStock={currentStock} scoredNews={scoredNews} />
                    )}
                  </div>

                  {/* Correlation pins */}
                  {chartPins.length > 0 && (
                    <div className="chart-pins">
                      {chartPins.map((n, i) => (
                        <span key={i} className={`chart-pin ${n.sentiment==='bullish'?'bull':'bear'}`}
                          title={n.headline}
                          onClick={() => n.url && window.open(n.url, '_blank')}>
                          {n.sentiment==='bullish'?'▲':'▼'} {n.source}
                        </span>
                      ))}
                    </div>
                  )}
                </div>

                {/* News feed with sentiment */}
                <div className="card">
                  <div className="card-title">
                    Recent News
                    <span style={{color:liveNews.length>0?'var(--accent)':'var(--text3)',fontSize:'10px',fontWeight:400}}>
                      {liveNews.length>0?`${liveNews.length} live`:hasFinnhubKey?'loading…':'demo'}
                      {sentimentLoading?' · scoring…':''}
                    </span>
                  </div>
                  {newsLoading ? (
                    [1,2,3].map(i=><div key={i} className="skeleton loading-bar" style={{height:'70px',marginBottom:'10px'}}></div>)
                  ) : scoredNews.length > 0 ? (
                    scoredNews.slice(0,6).map((n,i)=>(
                      <div key={i} className="news-item" onClick={()=>n.url&&window.open(n.url,'_blank')}>
                        <div className="news-meta">
                          <span style={{color:'var(--accent2)'}}>{n.source}</span>
                          <span>{n.time}</span>
                        </div>
                        <div className="news-headline">{n.headline}</div>
                        <div style={{display:'flex',gap:'6px',marginTop:'5px'}}>
                          <SentimentBadge sentiment={n.sentiment} score={n.sentimentScore} />
                          <span style={{background:'rgba(34,211,238,0.1)',color:'var(--accent2)',borderRadius:'4px',padding:'2px 8px',fontSize:'10px',fontWeight:600}}>LIVE ↗</span>
                        </div>
                      </div>
                    ))
                  ) : (
                    <div style={{color:'var(--text3)',fontSize:'13px',padding:'20px 0',textAlign:'center'}}>
                      {hasFinnhubKey?'No articles found':'Add your Finnhub key in API Settings'}
                    </div>
                  )}
                </div>
              </div>

              {/* Watchlist table */}
              <div className="card">
                <div className="card-title">Watchlist Overview</div>
                <table className="port-table">
                  <thead>
                    <tr><th>Ticker</th><th>Price</th><th>Change</th><th>Signal</th><th>Prev Close</th></tr>
                  </thead>
                  <tbody>
                    {watchlist.map(s=>(
                      <tr key={s.sym} onClick={()=>setActiveTicker(s.sym)} style={{cursor:'pointer'}}>
                        <td><div style={{fontWeight:500}}>{s.sym}</div><div style={{fontSize:'11px',color:'var(--text3)'}}>{s.name.split(' ').slice(0,2).join(' ')}</div></td>
                        <td>{s.price!=null?fmt$(s.price):<span style={{color:'var(--text3)'}}>—</span>}</td>
                        <td className={(s.chg||0)>=0?'pos':'neg'}>{s.chg!=null?fmtPct(s.chg):'—'}</td>
                        <td><span style={{color:(s.chg||0)>=0?'var(--accent)':'var(--red)',fontSize:'11px'}}>
                          {s.chg!=null?((s.chg||0)>=0?'▲ Bullish':'▼ Bearish'):'—'}
                        </span></td>
                        <td style={{color:'var(--text2)',fontSize:'12px'}}>{s.prevClose?fmt$(s.prevClose):'—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </>
          )}

          {/* ── PORTFOLIO TAB ── */}
          {activeTab === 'portfolio' && (
            <PortfolioPanel watchlist={watchlist} apiKeys={apiKeys} />
          )}

          {/* ── ALERTS TAB ── */}
          {activeTab === 'alerts' && (
            <AlertsPanel watchlist={watchlist} alerts={alerts} setAlerts={setAlerts} />
          )}

          {/* ── COMPARE TAB ── */}
          {activeTab === 'compare' && (
            <ComparePanel
              watchlist={watchlist}
              apiKeys={apiKeys}
              hasFinnhubKey={hasFinnhubKey}
              hasAnthropicKey={hasAnthropicKey}
            />
          )}

          {/* ── AI TAB ── */}
          {activeTab === 'ai' && (
            <div className="ai-panel">
              <div className="ai-header">
                <div className="ai-badge"><Icon.Spark />AI</div>
                <div className="ai-title">{activeTicker} Investment Analysis</div>
                <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                  {scoredNews.filter(n=>n.sentiment).length > 0 && (
                    <span style={{fontSize:'11px',color:'var(--accent)',background:'rgba(74,222,128,0.1)',padding:'3px 8px',borderRadius:'4px'}}>
                      {bullCount}↑ {bearCount}↓ sentiment fed to AI
                    </span>
                  )}
                  {!hasAnthropicKey && (
                    <button className="btn-secondary" style={{fontSize:'12px',padding:'5px 12px'}} onClick={()=>setShowSettings(true)}>
                      Connect API →
                    </button>
                  )}
                </div>
              </div>
              <div className={`ai-output ${aiLoading?'cursor':''}`}>
                {aiResponse ? (
                  aiResponse.split('\n\n').map((para,i)=>(
                    <p key={i} dangerouslySetInnerHTML={{__html:para
                      .replace(/BULLISH/g,'<span class="bull">▲ BULLISH</span>')
                      .replace(/BEARISH/g,'<span class="bear">▼ BEARISH</span>')
                      .replace(/NEUTRAL/g,'<strong>● NEUTRAL</strong>')
                      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
                    }}/>
                  ))
                ) : aiLoading ? (
                  [90,75,85].map((w,i)=><div key={i} className="skeleton loading-bar" style={{width:`${w}%`}}></div>)
                ) : (
                  <p style={{color:'var(--text3)'}}>
                    {hasAnthropicKey
                      ?`Click "⚡ Analyze" for an AI-powered analysis of ${activeTicker}${scoredNews.filter(n=>n.sentiment).length>0?` — ${scoredNews.filter(n=>n.sentiment).length} scored headlines ready`:''}.`
                      :'Connect your Anthropic API key in Settings to enable AI analysis.'}
                  </p>
                )}
              </div>
              <div className="ai-prompt-area">
                <input className="ai-input"
                  placeholder={`Ask about ${activeTicker}… e.g. "What's the biggest risk right now?"`}
                  value={aiQuery} onChange={e=>setAiQuery(e.target.value)}
                  onKeyDown={e=>{ if(e.key==='Enter'&&aiQuery.trim()){ runAIAnalysis(aiQuery); setAiQuery(''); } }} />
                <button className="ai-submit" disabled={aiLoading||!aiQuery.trim()}
                  onClick={()=>{ runAIAnalysis(aiQuery); setAiQuery(''); }}>Ask AI</button>
              </div>
            </div>
          )}

          <div style={{height:'40px'}}></div>
        </div>
      </main>

      {showSettings && (
        <SettingsModal
          savedKeys={{ anthropic:'', finnhub:'', ...apiKeys }}
          onSave={saveKeys}
          onClose={() => setShowSettings(false)}
        />
      )}

      <Toast toasts={toasts} dismiss={dismissToast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
